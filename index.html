<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richard Z. | EKG Vitals Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-dark: #0a0e27;
            --color-darker: #050810;
            --color-surface: #1a1f3a;
            --color-border: #2d3454;
            --color-accent: #00d4ff;
            --color-accent-alt: #ff6b9d;
            --color-text: #e8eef7;
            --color-text-secondary: #a8b2d1;
            --color-text-muted: #6b7494;
            --font-mono: 'Space Mono', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-dark);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 3rem;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--color-accent);
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

        nav a:hover {
            color: var(--color-accent);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            padding: 8rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(255, 107, 157, 0.05) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero h1 {
            font-family: var(--font-mono);
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-alt) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .hero .subtitle {
            font-size: 1.3rem;
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        .hero-meta {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 3rem;
            flex-wrap: wrap;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        .hero-meta span {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-meta span strong {
            color: var(--color-accent);
        }

        /* Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Sections */
        section {
            padding: 6rem 0;
            border-bottom: 1px solid var(--color-border);
        }

        section:last-of-type {
            border-bottom: none;
        }

        .section-header {
            margin-bottom: 3rem;
        }

        .section-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: block;
        }

        section h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        section h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            color: var(--color-text);
        }

        section p {
            font-size: 1rem;
            color: var(--color-text);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin: 2rem 0;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Feature Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .feature-card {
            background: var(--color-surface);
            padding: 2rem;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-accent), var(--color-accent-alt));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .feature-card:hover {
            border-color: var(--color-accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.1);
        }

        .feature-card:hover::before {
            transform: scaleX(1);
        }

        .feature-card h3 {
            font-size: 1.3rem;
            color: var(--color-accent);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .feature-card p {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
            margin: 0;
            line-height: 1.7;
        }

        /* Specs Table */
        .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .specs-table th {
            background: var(--color-surface);
            color: var(--color-accent);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--color-border);
        }

        .specs-table td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.95rem;
        }

        .specs-table tr:hover {
            background: rgba(0, 212, 255, 0.03);
        }

        .specs-table tr:last-child td {
            border-bottom: none;
        }

        .specs-table td:first-child {
            color: var(--color-text);
            font-weight: 500;
        }

        .specs-table td:nth-child(2) {
            color: var(--color-accent);
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        /* Tech Tags */
        .tech-stack {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .tech-tag {
            background: var(--color-surface);
            color: var(--color-accent);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85
